# ── Local / Home PC side ──────────────────────────────────────────────────────
# Runs only frpc (the tunnel client).
# Ollama and Ktor run natively on your machine — frpc reaches them via
# host.docker.internal.
#
# Before starting:
#   1. cp .env.example .env
#   2. Set VPS_HOST and FRP_TOKEN in .env
#   3. Run ./setup.sh from the project root
#   4. docker compose up -d

services:

  # ── frpc (tunnel client) ───────────────────────────────────────────────────
  # frpc.ini is AUTO-GENERATED — edit services.conf and run ./setup.sh
  frpc:
    image: snowdreamtech/frpc:0.51.3
    restart: unless-stopped
    volumes:
      - ./frpc.ini:/etc/frp/frpc.ini:ro
    extra_hosts:
      # lets frpc reach processes running directly on your machine
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    command: frpc -c /etc/frp/frpc.ini
