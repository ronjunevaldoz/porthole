# services.conf — single source of truth for everything you want to expose
#
# Format:  name : local_port : remote_port : local_host (optional)
#
# local_host is WHERE frpc connects to locally:
#   - Use the docker service name  (e.g. "ollama") for services in the same compose file
#   - Omit / leave blank           for processes running directly on your machine (host)
#
# After editing this file run:  ./setup.sh
# That regenerates local/frpc.ini and vps/docker-compose.yml automatically.

# ── LLM ──────────────────────────────────────────────────────────────────────
ollama          : 11434 : 11434

# ── Common extras (uncomment to enable) ───────────────────────────────────────
# open-webui    : 3000  : 3000
# comfyui       : 8188  : 8188
# n8n           : 5678  : 5678
# litellm       : 4000  : 4000

# ── FastAPI (uvicorn, native process) ─────────────────────────────────────────
# Start with: uvicorn main:app --host 0.0.0.0 --port 8000
# fastapi       : 8000  : 8000

# ── Ktor (native process) ──────────────────────────────────────────────────────
# Bind with: embeddedServer(Netty, port = 8080, host = "0.0.0.0")
ktor            : 8080  : 8080

# ── Other ──────────────────────────────────────────────────────────────────────
# my-grpc       : 50051 : 50051
