<svg viewBox="0 0 740 460" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','Fira Code',monospace" font-size="12">
  <!-- Background -->
  <rect width="740" height="460" fill="#0f1117" rx="10"/>
  <rect width="740" height="460" fill="none" stroke="#2a2d3e" stroke-width="1" rx="10"/>

  <!-- Header -->
  <rect width="740" height="46" fill="#1a1d27" rx="10"/>
  <rect y="10" width="740" height="36" fill="#1a1d27"/>
  <rect y="45" width="740" height="1" fill="#2a2d3e"/>
  <text x="20" y="28" fill="#e2e8f0" font-size="14" font-weight="600" letter-spacing="1">⬡ Porthole</text>
  <rect x="110" y="14" width="48" height="18" rx="9" fill="#14532d" stroke="#22c55e" stroke-width="0.8"/>
  <text x="134" y="27" fill="#4ade80" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.5">HTTPS</text>
  <text x="720" y="28" fill="#64748b" font-size="11" text-anchor="end">164.92.100.42</text>

  <!-- Left panel bg -->
  <rect x="0" y="46" width="268" height="414" fill="#0f1117"/>
  <rect x="267" y="46" width="1" height="414" fill="#2a2d3e"/>

  <!-- Config label -->
  <text x="18" y="72" fill="#64748b" font-size="10" letter-spacing="1.5" font-weight="500">CONFIG</text>

  <!-- Config rows -->
  <!-- VPS -->
  <rect x="0" y="82" width="267" height="1" fill="#2a2d3e"/>
  <text x="18" y="100" fill="#64748b">VPS</text>
  <text x="250" y="100" fill="#e2e8f0" text-anchor="end" font-weight="500">164.92.100.42</text>
  <!-- Domain -->
  <rect x="0" y="108" width="267" height="1" fill="#2a2d3e"/>
  <text x="18" y="126" fill="#64748b">Domain</text>
  <text x="250" y="126" fill="#e2e8f0" text-anchor="end" font-weight="500" font-size="11">myserver.duckdns.org</text>
  <!-- Email -->
  <rect x="0" y="134" width="267" height="1" fill="#2a2d3e"/>
  <text x="18" y="152" fill="#64748b">Email</text>
  <text x="250" y="152" fill="#e2e8f0" text-anchor="end" font-weight="500" font-size="11">you@example.com</text>
  <!-- SSH Key -->
  <rect x="0" y="160" width="267" height="1" fill="#2a2d3e"/>
  <text x="18" y="178" fill="#64748b">SSH Key</text>
  <text x="250" y="178" fill="#22c55e" text-anchor="end" font-weight="500">✓ found</text>
  <!-- FRP Token -->
  <rect x="0" y="186" width="267" height="1" fill="#2a2d3e"/>
  <text x="18" y="204" fill="#64748b">FRP Token</text>
  <text x="250" y="204" fill="#e2e8f0" text-anchor="end">••••••••</text>
  <!-- DuckDNS -->
  <rect x="0" y="212" width="267" height="1" fill="#2a2d3e"/>
  <text x="18" y="230" fill="#64748b">DuckDNS</text>
  <text x="250" y="230" fill="#e2e8f0" text-anchor="end">••••••••</text>

  <!-- Right panel -->
  <rect x="268" y="46" width="472" height="414" fill="#0f1117"/>

  <!-- Services header bar -->
  <rect x="268" y="46" width="472" height="44" fill="#1a1d27"/>
  <rect x="268" y="89" width="472" height="1" fill="#2a2d3e"/>
  <text x="286" y="72" fill="#64748b" font-size="10" letter-spacing="1.5" font-weight="500">SERVICES</text>
  <!-- Add button -->
  <rect x="672" y="57" width="54" height="22" rx="5" fill="#1a1d27" stroke="#2a2d3e" stroke-width="0.8"/>
  <text x="699" y="72" fill="#e2e8f0" font-size="11" text-anchor="middle">+ Add</text>

  <!-- Table header -->
  <rect x="268" y="90" width="472" height="30" fill="#161820"/>
  <rect x="268" y="119" width="472" height="1" fill="#2a2d3e"/>
  <text x="286" y="109" fill="#64748b" font-size="10" letter-spacing="1" font-weight="500">NAME</text>
  <text x="420" y="109" fill="#64748b" font-size="10" letter-spacing="1" font-weight="500">LOCAL</text>
  <text x="542" y="109" fill="#64748b" font-size="10" letter-spacing="1" font-weight="500">URL</text>

  <!-- Row 1: ollama — UP -->
  <rect x="268" y="155" width="472" height="1" fill="#2a2d3e"/>
  <circle cx="290" cy="143" r="4" fill="#22c55e" filter="url(#glow)"/>
  <text x="302" y="147" fill="#e2e8f0">ollama</text>
  <rect x="408" y="133" width="100" height="20" rx="4" fill="#161820" stroke="#2a2d3e" stroke-width="0.8"/>
  <text x="458" y="147" fill="#64748b" text-anchor="middle" font-size="11">localhost:11434</text>
  <text x="534" y="147" fill="#6366f1" font-size="11">https://myserver.duckdns.org/ollama/</text>
  <rect x="680" y="133" width="50" height="20" rx="4" fill="#0f1117" stroke="#ef4444" stroke-width="0.8"/>
  <text x="705" y="147" fill="#ef4444" font-size="11" text-anchor="middle">Remove</text>

  <!-- Row 2: ktor — UP -->
  <rect x="268" y="181" width="472" height="1" fill="#2a2d3e"/>
  <circle cx="290" cy="169" r="4" fill="#22c55e" filter="url(#glow)"/>
  <text x="302" y="173" fill="#e2e8f0">ktor</text>
  <rect x="408" y="159" width="94" height="20" rx="4" fill="#161820" stroke="#2a2d3e" stroke-width="0.8"/>
  <text x="455" y="173" fill="#64748b" text-anchor="middle" font-size="11">localhost:8080</text>
  <text x="534" y="173" fill="#6366f1" font-size="11">https://myserver.duckdns.org/ktor/</text>
  <rect x="680" y="159" width="50" height="20" rx="4" fill="#0f1117" stroke="#ef4444" stroke-width="0.8"/>
  <text x="705" y="173" fill="#ef4444" font-size="11" text-anchor="middle">Remove</text>

  <!-- Row 3: fastapi — DOWN -->
  <rect x="268" y="207" width="472" height="1" fill="#2a2d3e"/>
  <circle cx="290" cy="195" r="4" fill="#ef4444"/>
  <text x="302" y="199" fill="#e2e8f0">fastapi</text>
  <rect x="408" y="185" width="94" height="20" rx="4" fill="#161820" stroke="#2a2d3e" stroke-width="0.8"/>
  <text x="455" y="199" fill="#64748b" text-anchor="middle" font-size="11">localhost:8000</text>
  <text x="534" y="199" fill="#6366f1" font-size="11">https://myserver.duckdns.org/fastapi/</text>
  <rect x="680" y="185" width="50" height="20" rx="4" fill="#0f1117" stroke="#ef4444" stroke-width="0.8"/>
  <text x="705" y="199" fill="#ef4444" font-size="11" text-anchor="middle">Remove</text>

  <!-- Output log -->
  <rect x="268" y="330" width="472" height="1" fill="#2a2d3e"/>
  <rect x="268" y="331" width="472" height="82" fill="#0a0c12"/>
  <text x="286" y="351" fill="#22c55e" font-size="11">✓  local/frpc.ini</text>
  <text x="286" y="367" fill="#22c55e" font-size="11">✓  vps/docker-compose.yml</text>
  <text x="286" y="383" fill="#22c55e" font-size="11">✓  VPS frps restarted</text>
  <text x="286" y="399" fill="#22c55e" font-size="11">✓  Nginx config updated</text>

  <!-- Action bar -->
  <rect x="268" y="412" width="472" height="1" fill="#2a2d3e"/>
  <rect x="268" y="413" width="472" height="47" fill="#1a1d27"/>
  <!-- Sync button -->
  <rect x="286" y="424" width="68" height="26" rx="6" fill="#6366f1"/>
  <text x="320" y="441" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="500">⟳ Sync</text>
  <!-- Status button -->
  <rect x="362" y="424" width="74" height="26" rx="6" fill="#1a1d27" stroke="#2a2d3e" stroke-width="0.8"/>
  <text x="399" y="441" fill="#e2e8f0" font-size="12" text-anchor="middle">◎ Status</text>
  <!-- Last action -->
  <text x="726" y="441" fill="#64748b" font-size="11" text-anchor="end">synced 10:24 PM</text>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
