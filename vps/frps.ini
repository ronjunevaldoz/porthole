[common]
# Port frpc clients connect to
bind_port = 7000

# Shared secret — must match frpc.ini token
token = {{ FRP_TOKEN }}

# Optional web dashboard (remove if you don't want it)
dashboard_port = 7500
dashboard_user = admin
dashboard_pwd  = {{ DASHBOARD_PWD }}

# Log to stdout so Docker picks it up
log_file   = /dev/stdout
log_level  = info
log_max_days = 3
